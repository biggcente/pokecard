<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PokeCard - Acceso</title>

<style>
/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* BODY */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #1f2937, #020617);
    color:white;
    overflow:hidden;
}

/* EFECTO FONDO */
body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,80,0,0.3), transparent);
    top:-100px;
    right:-100px;
    filter: blur(100px);
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background: radial-gradient(circle, rgba(0,150,255,0.2), transparent);
    bottom:-100px;
    left:-100px;
    filter: blur(100px);
}

/* HEADER */
header{
    position:absolute;
    top:25px;
}

header a{
    text-decoration:none;
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:1px;
    transition:0.3s;
}

header a:hover{
    text-shadow:0 0 10px rgba(255,255,255,0.6);
}

/* CONTENEDOR */
.container{
    width:360px;
    padding:35px;
    border-radius:25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow:0 20px 60px rgba(0,0,0,0.8);
    position:relative;
    z-index:1;
    animation: aparecer 0.6s ease;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* TABS */
.tabs{
    display:flex;
    justify-content:space-around;
    margin-bottom:25px;
}

.tabs button{
    background:none;
    border:none;
    color:#777;
    font-size:16px;
    cursor:pointer;
    padding:10px;
    transition:0.3s;
    position:relative;
}

.tabs button.active{
    color:white;
}

.tabs button.active::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:2px;
    background:linear-gradient(90deg,#ff4d4d,#ff9900);
}

/* FORM */
.form{
    display:none;
    animation: fade 0.4s ease;
}

.form.active{
    display:block;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border:none;
    border-radius:12px;
    background:#0f172a;
    color:white;
    outline:none;
    transition:0.3s;
}

input:focus{
    box-shadow:0 0 10px rgba(255,100,0,0.5);
    transform:scale(1.02);
}

/* BOTÓN */
.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#ff4d4d,#ff9900);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(255,100,0,0.6);
}

/* MENSAJE */
#msg{
    margin-top:12px;
    text-align:center;
    font-size:14px;
    min-height:18px;
    color:#ccc;
}
</style>

</head>
<body>

<header>
    <a href="index.html">🔥 Pokédex Phantasmal Flames</a>
</header>

<div class="container">

    <div class="tabs">
        <button id="loginTab" class="active" onclick="mostrar('login')">Iniciar sesión</button>
        <button id="regTab" onclick="mostrar('registro')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div id="login" class="form active">
        <input type="text" id="loginUser" placeholder="Usuario">
        <input type="password" id="loginPass" placeholder="Contraseña">
        <button class="btn" onclick="login()">Entrar</button>
    </div>

    <!-- REGISTRO -->
    <div id="registro" class="form">
        <input type="text" id="regUser" placeholder="Usuario">
        <input type="password" id="regPass" placeholder="Contraseña">
        <input type="password" id="regPass2" placeholder="Confirmar contraseña">
        <button class="btn" onclick="registrar()">Crear cuenta</button>
    </div>

    <p id="msg"></p>

</div>

<script>
function mostrar(tipo){
    const login = document.getElementById("login");
    const registro = document.getElementById("registro");
    const loginTab = document.getElementById("loginTab");
    const regTab = document.getElementById("regTab");

    login.classList.remove("active");
    registro.classList.remove("active");
    loginTab.classList.remove("active");
    regTab.classList.remove("active");

    if(tipo === "login"){
        login.classList.add("active");
        loginTab.classList.add("active");
    }else{
        registro.classList.add("active");
        regTab.classList.add("active");
    }

    document.getElementById("msg").innerText = "";
}

function registrar(){
    let user = document.getElementById("regUser").value.trim();
    let pass = document.getElementById("regPass").value;
    let pass2 = document.getElementById("regPass2").value;
    let msg = document.getElementById("msg");

    if(!user || !pass || !pass2){
        msg.innerText = "⚠ Completa todos los campos";
        return;
    }

    if(pass !== pass2){
        msg.innerText = "❌ Las contraseñas no coinciden";
        return;
    }

    localStorage.setItem("usuario", JSON.stringify({user, pass}));

    msg.innerText = "✅ Cuenta creada";

    setTimeout(() => {
        mostrar("login");
        msg.innerText = "Ahora inicia sesión";
    }, 1000);
}

function login(){
    let user = document.getElementById("loginUser").value.trim();
    let pass = document.getElementById("loginPass").value;
    let msg = document.getElementById("msg");

    let data = JSON.parse(localStorage.getItem("usuario"));

    if(!data){
        msg.innerText = "❌ No hay cuenta registrada";
        return;
    }

    if(user === data.user && pass === data.pass){
        localStorage.setItem("logueado", "true");
        window.location.href = "index.html";
    }else{
        msg.innerText = "❌ Datos incorrectos";
    }
}
</script>

</body>
</html>
