<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PokeCard - Pokédex</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header class="header">
        <img src="/assets/img_pkm/logo.png" alt="Fantasmal Flames Pokemon" class="FantasmalLogo">
        <div class="acciones" id="accionesHeader">
        </div>
        <button class ="btn_colection"onclick="abrirModal()">Colecciones</button>
    </header>

<div id="miModal" class="modal">
    <div class="expancion">
        <span class="cerrar" onclick="cerrarModal()">&times;</span>

        <h2>Expancion</h2>

        <div>
            <img src="assets/img_pkm/ex-phantasmal.png" alt="Expanción Phantasmal Flames">
            <img src="assets/img_pkm/" alt="Expanción Mega Evolution">
            <img src="assets/img_pkm/" alt="Expanción Ascended Hero">
            <img src="assets/img_pkm/" alt="Expanción Perfect Order">
        </div>        
    </div>
</div> 

<div class="stats">
    <p>📦 Tienes: <span id="tienes">0</span></p>
    <p>❌ Faltan: <span id="faltan">0</span></p>
</div>

<div class="grid" id="contenedor"></div>

<!-- Modelo de Login / Registro -->
<div id="modalAuth" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal()">✖</span>

        <!-- Pestañas -->
        <div class="tabs">
            <a onclick="mostrarFormulario('login')">Iniciar sesión</a> |
            <a onclick="mostrarFormulario('registro')">Registrarse</a>
        </div>

        <!-- Formulario de inicio de sesión -->
        <div id="formLogin">
            <h3>Iniciar sesión</h3>
            <input type="text" id="loginUser" placeholder="Usuario">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <button onclick="login()">Entrar</button>
        </div>

        <!-- Formulario de registro -->
        <div id="formRegistro" class="hidden">
            <h3>Registrarse</h3>
            <input type="text" id="regUser" placeholder="Usuario">
            <input type="password" id="regPass" placeholder="Contraseña">
            <button onclick="register()">Crear cuenta</button>
        </div>
    </div>
</div>

<script src="/assets/js/script.js"></script>

</body>
</html>
